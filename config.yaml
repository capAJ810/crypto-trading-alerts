# ── Crypto alerts configuration ──────────────────────────────────────
# Add a coin:      one line under `symbols` (use {pair: X/USDT, exchange: kucoin}
#                  if it isn't on Binance).
# Add a metric:    new entry under `rules` (see alerts/rules.py for how to
#                  write new rule types).
# Add a recipient: edit the ALERT_EMAILS / TELEGRAM_CHAT_IDS secrets — no
#                  code change needed.

timeframe: 5m        # candle size the rules evaluate on (5m, 15m, 1h, 4h, 1d, ...)
exchange: binance    # default data source (public endpoints, no API key)
candles: 400         # history per check (EMA200 needs ~2x its length to settle)

symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT
  - ASTER/USDT
  - {pair: HYPE/USDT, exchange: kucoin}   # not listed on Binance spot

rules:
  # The core signal, evaluated on CLOSED candles only.
  # BUY:  EMA9 crosses above EMA21 · RSI > 55 · volume > 20-period avg ·
  #       close > EMA200.
  # SELL: EMA9 crosses below EMA21 · RSI < 45 · volume > 20-period avg ·
  #       close < EMA200.
  # alert_weak also reports crosses that fail some filters as ⚠️ WEAK
  # (listing exactly which checks failed).
  - name: ema_cross_rsi
    params: {fast: 9, slow: 21, rsi_len: 14, rsi_buy: 55, rsi_sell: 45,
             volume_avg: 20, trend_ema: 200, alert_weak: true}

  # Early heads-up while EMA9 converges toward EMA21 (before the cross):
  # 🟡 NEAR-BUY / NEAR-SELL. once_per_side = one alert per approach episode.
  - name: ema_cross_soon
    once_per_side: true
    params: {fast: 9, slow: 21, gap_pct: 0.08}

  # ⏱️ Chart-time (intrabar) alerts: fire the moment the FORMING candle
  # shows the cross — what the chart draws — before close confirmation.
  # Unconfirmed by nature (the cross can fade); checked every ~30s.
  # Volume filter skipped (a partial candle's volume can't be compared).
  # Comment this block out to go back to close-confirmed alerts only.
  - name: ema_cross_intrabar
    params: {fast: 9, slow: 21, rsi_len: 14, rsi_buy: 55, rsi_sell: 45,
             trend_ema: 200}

  # More ready-made rule types (uncomment to enable):
  # - name: rsi_extreme
  #   params: {rsi_len: 14, overbought: 70, oversold: 30}
  # - name: price_cross_level
  #   symbols: [BTC/USDT]          # optional: restrict a rule to some pairs
  #   params: {level: 100000}

notify:
  # Broadcast channels — every alert goes to all of these.
  # ${VARS} come from GitHub Actions secrets (CI) or .env (local);
  # ALERT_EMAILS is comma-separated. Any Apprise URL works here —
  # Discord, Slack, SMS, push, 100+ services:
  # https://github.com/caronc/apprise/wiki
  - "mailto://${GMAIL_USER}:${GMAIL_APP_PASSWORD}@gmail.com?to=${ALERT_EMAILS}"

# Interactive Telegram bot (alerts/telegram_bot.py): inline buttons let each
# allowlisted chat (TELEGRAM_CHAT_IDS secret, slash-separated) pick which
# coins alert it; /status gives live snapshots. Alerts route per-chat by
# those subscriptions instead of broadcasting.
telegram:
  enabled: true
