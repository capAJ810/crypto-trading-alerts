name: crypto-alerts

on:
  schedule:
    # Backup only: restarts the run chain if it ever dies. GitHub's cron
    # proved unreliable for minutes-level schedules (hours of silence), so
    # the primary cadence comes from each run dispatching the next one
    # (see the "Chain next run" step).
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      test_notify:
        description: "Send a test notification instead of checking signals"
        type: boolean
        default: false

permissions:
  contents: write   # to commit state.json back
  actions: write    # to self-dispatch the next run

concurrency:
  group: crypto-alerts
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run watcher
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAILS: ${{ secrets.ALERT_EMAILS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: |
          if [ "${{ inputs.test_notify }}" = "true" ]; then
            python -m alerts.watcher --test-notify
          else
            python -m alerts.watcher --run-for 250
          fi

      - name: Nightly self-tune (runs when >24h since last tune)
        if: ${{ inputs.test_notify != true }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python -m alerts.tuner --if-due

      - name: Persist alert state
        # Committing state.json prevents duplicate alerts across runs and
        # keeps the repo active (GitHub disables cron workflows after 60
        # days without commits).
        run: |
          git config user.name "alerts-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json telegram.json signals_log.json tuned.yaml
          git diff --cached --quiet || {
            git commit -m "chore: update alert state [skip ci]"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          }

      - name: Chain next run
        # workflow_dispatch via GITHUB_TOKEN is a documented exception to
        # GitHub's recursion guard, so each run can start the next one.
        # The concurrency group above queues it until this job finishes;
        # duplicates from the backup cron collapse into that same queue.
        # always() keeps the chain alive across transient fetch failures.
        if: ${{ always() && inputs.test_notify != true }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run alerts.yml --ref "$GITHUB_REF_NAME" -R "$GITHUB_REPOSITORY"
